<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>COORA - Request Help</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="index.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#22c55e',
                    }
                }
            }
        }
    </script>
    <style>
        .grid-img-card {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
        }

        .grid-img-card img {
            width: 100%;
            height: 80px;
            object-fit: cover;
            transition: transform 0.3s;
        }

        .grid-img-card:hover img,
        .grid-img-card.selected img {
            transform: scale(1.05);
        }

        .grid-img-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.6) 0%, rgba(0, 0, 0, 0) 100%);
        }

        .grid-img-card.selected::before {
            content: '';
            position: absolute;
            inset: 0;
            border: 3px solid #22c55e;
            border-radius: 12px;
            z-index: 20;
        }

        .grid-title-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 1px solid rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(4px);
            padding: 4px 12px;
            border-radius: 6px;
            color: white;
            font-weight: 600;
            font-size: 14px;
            z-index: 10;
            white-space: nowrap;
        }

        /* Step transitions */
        .step-container {
            display: none;
            animation: fadeIn 0.3s ease-out;
        }

        .step-container.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-overlay {
            display: none;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(2px);
            animation: fadeIn 0.2s ease-out;
        }

        .modal-overlay.active {
            display: flex;
        }
    </style>
</head>

<body class="bg-gray-100">
    <div class="app-container no-scrollbar relative bg-white min-h-screen">

        <!-- Status Bar -->
        <div class="flex justify-between items-center px-6 pt-4 pb-2 bg-white sticky top-0 z-50">
            <span class="text-[15px] font-semibold tracking-tight text-black">9:41</span>
            <div class="flex items-center gap-1.5 fill-black">
                <svg width="18" height="12" viewBox="0 0 18 12">
                    <path
                        d="M14.5 9H16.5C17.0523 9 17.5 8.55228 17.5 8V4C17.5 3.44772 17.0523 3 16.5 3H14.5C13.9477 3 13.5 3.44772 13.5 4V8C13.5 8.55228 13.9477 9 14.5 9Z" />
                    <path
                        d="M10 9H12C12.5523 9 13 8.55228 13 8V5C13 4.44772 12.5523 4 12 4H10C9.44772 4 9 4.44772 9 5V8C9 8.55228 9.44772 9 10 9Z" />
                    <path
                        d="M5.5 9H7.5C8.05228 9 8.5 8.55228 8.5 8V6C8.5 5.44772 8.05228 5 7.5 5H5.5C4.94772 5 4.5 5.44772 4.5 6V8C4.5 8.55228 4.94772 9 5.5 9Z" />
                    <path
                        d="M1 9H3C3.55228 9 4 8.55228 4 8V7C4 6.44772 3.55228 6 3 6H1C0.447715 6 0 6.44772 0 7V8C0 8.55228 0.447715 9 1 9Z" />
                </svg>
                <svg width="16" height="12" viewBox="0 0 16 12">
                    <path fill-rule="evenodd" clip-rule="evenodd"
                        d="M8 11L15.5 3.5C13.4289 1.42893 10.8656 0.25 8 0.25C5.13438 0.25 2.57107 1.42893 0.5 3.5L8 11ZM8 9L13.5 3.5C12.0163 2.01632 10.0911 1.25 8 1.25C5.90886 1.25 3.9837 2.01632 2.5 3.5L8 9Z" />
                    <path
                        d="M8 11L12.5 6.5C11.3323 5.33232 9.7454 4.75 8 4.75C6.2546 4.75 4.66768 5.33232 3.5 6.5L8 11Z" />
                </svg>
                <svg width="25" height="12" viewBox="0 0 25 12">
                    <rect x="0.5" y="1" width="21" height="10" rx="3.5" stroke="black" />
                    <path d="M23 4V8C23.5523 8 24 7.55228 24 7V5C24 4.44772 23.5523 4 23 4Z" />
                    <rect x="2" y="2.5" width="13" height="7" rx="2.5" />
                </svg>
            </div>
        </div>

        <!-- Header -->
        <header class="px-6 py-4 flex items-center gap-4 bg-white sticky top-10 z-40">
            <a href="home.html"
                class="w-10 h-10 bg-white rounded-full flex items-center justify-center border border-gray-200 hover:bg-gray-50 flex-shrink-0">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </a>
            <h1 class="text-[26px] font-semibold tracking-tight text-[#30363d] leading-none">
                Request <span class="text-gray-500">Help</span>
            </h1>
        </header>

        <!-- STEP 1 CONTENT -->
        <div id="step1" class="step-container active px-6 pt-2 pb-32">

            <div class="mb-5">
                <label class="block text-[17px] font-semibold text-[#30363d] mb-2">Emergency Level</label>
                <div class="relative">
                    <select
                        class="w-full appearance-none border-2 border-gray-400/40 rounded-[10px] py-3.5 px-4 text-gray-500 text-[15px] font-medium focus:outline-none focus:border-green-500 bg-white">
                        <option value="" disabled selected>ex. Critical, Urgent, Moderate, Non-urgent</option>
                        <option value="critical">Critical</option>
                        <option value="urgent">Urgent</option>
                        <option value="moderate">Moderate</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-700">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="6 9 12 15 18 9"></polyline>
                        </svg>
                    </div>
                </div>
            </div>

            <div class="mb-5">
                <label class="block text-[17px] font-semibold text-[#30363d] mb-2">Location</label>
                <div class="flex items-center gap-3">
                    <div class="relative flex-1">
                        <select
                            class="w-full appearance-none border-2 border-gray-400/40 rounded-[10px] py-3.5 px-4 text-gray-400 text-[15px] font-medium focus:outline-none focus:border-green-500 bg-white">
                            <option value="">Auto-detect by GPS if left empty</option>
                            <option value="bogor">Bogor</option>
                            <option value="jakarta">Jakarta</option>
                        </select>
                        <div
                            class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-700">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="6 9 12 15 18 9"></polyline>
                            </svg>
                        </div>
                    </div>
                    <button class="w-12 h-12 flex items-center justify-center text-gray-600 shrink-0">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                            <circle cx="12" cy="10" r="3"></circle>
                        </svg>
                    </button>
                </div>
                <p class="text-[11px] font-bold text-gray-600 mt-2 flex items-center gap-1">
                    <span
                        class="inline-flex items-center justify-center bg-gray-200 rounded-full w-3.5 h-3.5 text-[9px] text-gray-700">!</span>
                    AI detected your GPS location is marked as high priority.
                </p>
            </div>

            <div class="mb-4">
                <label class="block text-[17px] font-semibold text-[#30363d] mb-4">What help do you need?</label>

                <div class="grid grid-cols-2 gap-3">
                    <div class="grid-img-card" onclick="toggleSelection(this)">
                        <img src="https://plus.unsplash.com/premium_photo-1742457725426-16d2ab795fc9?q=80&w=1074&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
                            alt="Flood">
                        <div class="grid-title-box">Flood</div>
                    </div>
                    <div class="grid-img-card selected" onclick="toggleSelection(this)">
                        <img
                            src="https://images.unsplash.com/photo-1540304351630-f4d1e29c15fe?w=400&q=https://images.unsplash.com/photo-1624737792190-aa08016af424?q=80&w=687&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D">
                        <div class="grid-title-box">Landslides</div>
                    </div>

                    <div class="grid-img-card h-[90px]" onclick="toggleSelection(this)">
                        <img src="https://plus.unsplash.com/premium_photo-1695914233513-6f9ca230abdb?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
                            alt="Earthquake" class="h-full">
                        <div class="grid-title-box">Earthquake</div>
                    </div>
                    <div class="grid-img-card h-[90px]" onclick="toggleSelection(this)">
                        <img src="https://images.unsplash.com/photo-1523861751938-121b5323b48b?q=80&w=1162&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
                            alt="Fire" class="h-full">
                        <div class="grid-title-box">Fire</div>
                    </div>
                </div>
                <div class="grid grid-cols-1 mt-3">
                    <div class="grid-img-card h-[80px]" onclick="toggleSelection(this)">
                        <img src="https://images.unsplash.com/photo-1605810230434-7631ac76ec81?w=800&q=80" alt="Other">
                        <div class="grid-title-box">Other</div>
                    </div>
                </div>
            </div>

            <!-- Bottom Floating Action -->
            <div
                class="fixed bottom-0 left-1/2 transform -translate-x-1/2 w-full max-w-[414px] bg-gradient-to-t from-white via-white/95 to-transparent pt-10 pb-8 px-6 z-40 flex flex-col items-end">
                <button onclick="nextStep()"
                    class="w-[140px] bg-[#34ea72] hover:bg-green-500 text-[#0d5926] font-bold text-lg py-3 rounded-full flex items-center justify-center gap-2 shadow-[0_4px_15px_rgba(52,234,114,0.4)] transition-transform hover:scale-105">
                    Next
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </button>
                <div class="text-gray-400 text-sm font-medium mt-2 w-[140px] text-center pr-2">Step 1/2</div>

                <!-- Bottom Handle -->
                <div class="w-32 h-1.5 bg-black rounded-full mx-auto mt-6"></div>
            </div>
        </div>

        <!-- STEP 2 CONTENT -->
        <div id="step2" class="step-container px-6 pt-2 pb-36 min-h-screen relative">

            <div class="mb-5">
                <label class="block text-[17px] font-semibold text-[#30363d] mb-2">Describe your situation</label>
                <input type="text" placeholder="Describe in detail..."
                    class="w-full border-2 border-gray-400/40 rounded-[10px] py-3.5 px-4 text-gray-500 text-[15px] font-medium focus:outline-none focus:border-green-500">
                <div class="text-right text-[11px] font-bold text-gray-400 mt-1">0/500</div>
            </div>

            <div class="mb-5">
                <label class="block text-[17px] font-semibold text-[#30363d] mb-2">Number of people affected</label>
                <div class="flex items-center gap-3">
                    <div class="relative flex-1">
                        <select
                            class="w-full appearance-none border-2 border-gray-400/40 rounded-[10px] py-3.5 px-4 text-gray-400 text-[15px] font-medium focus:outline-none focus:border-green-500 bg-white">
                            <option value="">Choose a number</option>
                            <option value="1">1 - 10</option>
                            <option value="2">11 - 50</option>
                            <option value="3">50+</option>
                        </select>
                        <div
                            class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-700">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="6 9 12 15 18 9"></polyline>
                            </svg>
                        </div>
                    </div>
                    <button class="w-12 h-12 flex items-center justify-center text-gray-600 shrink-0">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                            <circle cx="12" cy="10" r="3"></circle>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="mb-5">
                <label class="block text-[17px] font-semibold text-[#30363d] mb-2">Contact Information</label>
                <input type="tel" placeholder="Phone number (SMS)"
                    class="w-full border-2 border-gray-400/40 rounded-[10px] py-3.5 px-4 text-gray-500 text-[15px] font-medium focus:outline-none focus:border-green-500 bg-white">
            </div>

            <div class="mb-5">
                <label class="block text-[17px] font-semibold text-[#30363d] mb-2">Upload Media</label>
                <div
                    class="w-full h-[180px] border-2 border-gray-400/40 rounded-[14px] bg-[#fdfcfd] flex items-center justify-center cursor-pointer hover:bg-gray-50 transition-colors">
                    <div class="w-[52px] h-[52px] rounded-full bg-gray-200/80 flex items-center justify-center">
                        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="1.5"
                            stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                    </div>
                </div>
            </div>

            <div class="flex items-start gap-3 mt-4 pr-4">
                <div class="mt-1">
                    <input type="checkbox" id="confirmData"
                        class="w-5 h-5 rounded border-gray-300 text-green-500 focus:ring-green-500 bg-gray-200 border-transparent focus:bg-green-500 checked:bg-green-500 checked:border-green-500 appearance-none flex items-center justify-center after:content-[''] after:hidden checked:after:block after:w-1.5 after:h-2.5 after:border-r-2 after:border-b-2 after:border-white after:rotate-45 after:-translate-y-[2px]"
                        checked>
                </div>
                <label for="confirmData" class="text-[14px] font-bold text-gray-600 leading-tight">
                    I confirm this request is accurate and not false information.
                </label>
            </div>

            <!-- Bottom Floating Action -->
            <div
                class="absolute bottom-0 left-0 w-full min-h-[140px] bg-gradient-to-t from-white via-white/95 to-transparent pt-10 pb-8 px-6 z-40 flex flex-col items-end">
                <button onclick="submitForm()"
                    class="w-[140px] bg-[#34ea72] hover:bg-green-500 text-[#0d5926] font-bold text-lg py-3 rounded-full flex items-center justify-center gap-2 shadow-[0_4px_15px_rgba(52,234,114,0.4)] transition-transform hover:scale-105">
                    Send
                    <span>📩</span>
                </button>
                <div class="text-gray-400 text-sm font-medium mt-2 w-[140px] text-center pr-2 mb-4">Step 2/2</div>

                <!-- Bottom Handle -->
                <div class="fixed bottom-2 left-1/2 transform -translate-x-1/2 w-32 h-1.5 bg-black rounded-full z-50">
                </div>
            </div>

        </div>

    </div>

    <!-- SUCCESS MODAL OVERLAY -->
    <div id="successModal" class="modal-overlay fixed inset-0 z-[100] items-center justify-center p-6">
        <div
            class="bg-white rounded-xl shadow-2xl p-8 w-full max-w-[340px] border border-gray-200 text-center animate-[fadeIn_0.3s_ease-out]">
            <h3 class="text-lg font-extrabold text-[#30363d] mb-4">Your request has been <span
                    class="text-gray-500">sent!</span></h3>
            <p class="text-gray-600 text-[15px] font-medium leading-relaxed mb-8">
                Alerts have been sent to nearby volunteers, and we'll let you know if help is on the way!
            </p>
            <a href="home.html"
                class="inline-block bg-[#34ea72] hover:bg-green-500 text-[#0d5926] font-bold text-[17px] py-3.5 px-12 rounded-full cursor-pointer transition-transform hover:scale-105">
                Okay
            </a>
        </div>
    </div>

    <script>
        function toggleSelection(element) {
            // Optional behavior: multiselect or single select. Assuming single/multi toggle for prototype.
            element.classList.toggle('selected');
        }

        function nextStep() {
            document.getElementById('step1').classList.remove('active');
            window.scrollTo(0, 0);
            setTimeout(() => {
                document.getElementById('step2').classList.add('active');
            }, 50);
        }

        function submitForm() {
            document.getElementById('successModal').classList.add('active');
        }
    </script>
</body>

</html>

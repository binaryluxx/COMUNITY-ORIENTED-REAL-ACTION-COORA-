<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>COORA - Maps</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="index.css">
    <style>
        .radar-ping {
            animation: ping 3s cubic-bezier(0, 0, 0.2, 1) infinite;
        }
        @keyframes ping {
            75%, 100% {
                transform: scale(2.5);
                opacity: 0;
            }
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#22c55e',
                    }
                }
            }
        }
    </script>
</head>
<body>
    <div class="app-container no-scrollbar relative bg-gray-900">
        
        <!-- Full Screen Map Background -->
        <img src="https://images.unsplash.com/photo-1524661135-423995f22d0b?w=800&q=80" alt="Satellite Map" class="absolute inset-0 w-full h-full object-cover opacity-90">

        <!-- Status Bar Fake (White text for dark bg) -->
        <div class="flex justify-between items-center px-6 pt-4 pb-2 bg-transparent absolute top-0 w-full z-50">
            <span class="text-[15px] font-semibold tracking-tight text-white shadow-sm">9:41</span>
            <div class="flex items-center gap-1.5 opacity-90">
                <svg width="18" height="12" viewBox="0 0 18 12" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M14.5 9H16.5C17.0523 9 17.5 8.55228 17.5 8V4C17.5 3.44772 17.0523 3 16.5 3H14.5C13.9477 3 13.5 3.44772 13.5 4V8C13.5 8.55228 13.9477 9 14.5 9Z" fill="white"/>
                    <path d="M10 9H12C12.5523 9 13 8.55228 13 8V5C13 4.44772 12.5523 4 12 4H10C9.44772 4 9 4.44772 9 5V8C9 8.55228 9.44772 9 10 9Z" fill="white"/>
                    <path d="M5.5 9H7.5C8.05228 9 8.5 8.55228 8.5 8V6C8.5 5.44772 8.05228 5 7.5 5H5.5C4.94772 5 4.5 5.44772 4.5 6V8C4.5 8.55228 4.94772 9 5.5 9Z" fill="white"/>
                    <path d="M1 9H3C3.55228 9 4 8.55228 4 8V7C4 6.44772 3.55228 6 3 6H1C0.447715 6 0 6.44772 0 7V8C0 8.55228 0.447715 9 1 9Z" fill="white"/>
                </svg>
                <svg width="16" height="12" viewBox="0 0 16 12" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path fill-rule="evenodd" clip-rule="evenodd" d="M8 11L15.5 3.5C13.4289 1.42893 10.8656 0.25 8 0.25C5.13438 0.25 2.57107 1.42893 0.5 3.5L8 11ZM8 9L13.5 3.5C12.0163 2.01632 10.0911 1.25 8 1.25C5.90886 1.25 3.9837 2.01632 2.5 3.5L8 9Z" fill="white"/>
                    <path d="M8 11L12.5 6.5C11.3323 5.33232 9.7454 4.75 8 4.75C6.2546 4.75 4.66768 5.33232 3.5 6.5L8 11Z" fill="white"/>
                </svg>
                <svg width="25" height="12" viewBox="0 0 25 12" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="0.5" y="1" width="21" height="10" rx="3.5" stroke="white"/>
                    <path d="M23 4V8C23.5523 8 24 7.55228 24 7V5C24 4.44772 23.5523 4 23 4Z" fill="white"/>
                    <rect x="2" y="2.5" width="13" height="7" rx="2.5" fill="white"/>
                </svg>
            </div>
        </div>

        <!-- Header -->
        <header class="absolute top-12 w-full z-40 flex flex-col items-center">
            <span class="text-xs text-white/80 font-semibold tracking-wider uppercase drop-shadow-md">Location</span>
            <button class="flex items-center gap-1 text-[20px] font-bold text-white drop-shadow-md">
                Cengkareng, West Jakarta
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="6 9 12 15 18 9"></polyline>
                </svg>
            </button>
        </header>

        <!-- Map Elements (Radar & Avatars) -->
        <div class="absolute inset-0 z-10 flex items-center justify-center">
            <!-- Center Radar -->
            <div class="relative w-48 h-48 mt-[-150px] ml-[100px]">
                <!-- Base Circle -->
                <div class="absolute inset-0 bg-red-500/20 rounded-full border border-red-500/30 backdrop-blur-[2px]"></div>
                <!-- Ping Animation Circle -->
                <div class="absolute inset-0 bg-red-500/30 rounded-full radar-ping"></div>

                <!-- Center Pin -->
                <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="white" stroke="none">
                        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
                    </svg>
                </div>
                
                <!-- Floating Avatars around the area -->
                <img src="assets/rana_avatar.png" class="absolute top-4 left-4 w-9 h-9 rounded-lg border-2 border-white transform rotate-[-10deg] shadow-lg object-cover" onerror="this.src='https://ui-avatars.com/api/?name=Ran&background=random'">
                <img src="https://images.unsplash.com/photo-1544005313-94ddf0286df2?w=100&q=80" class="absolute top-8 right-0 w-9 h-9 rounded-lg border-2 border-white transform rotate-[10deg] shadow-lg object-cover">
                <img src="assets/rana_avatar.png" class="absolute bottom-6 left-12 w-9 h-9 border-2 border-white transform rotate-[5deg] shadow-lg object-cover" style="clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);" onerror="this.src='https://ui-avatars.com/api/?name=User&background=random'">
                <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=100&q=80" class="absolute bottom-4 right-10 w-9 h-9 rounded-full border-2 border-white shadow-lg object-cover">
            </div>

            <!-- Focus button (bottom left) -->
            <button class="absolute top-[45%] left-10 w-12 h-12 bg-white/20 backdrop-blur-md border border-white/30 rounded-full flex items-center justify-center shadow-lg">
                <div class="w-2 h-2 bg-black rounded-full"></div>
            </button>
            <div class="absolute top-[45%] left-10 w-12 h-12 border border-white/20 rounded-full radar-ping" style="animation-duration: 4s;"></div>
        </div>

        <!-- Alert Popup Card -->
        <div class="absolute bottom-[280px] left-6 right-6 z-30">
            <!-- Avatars overlapping top-left of popup -->
            <div class="absolute -top-4 left-4 flex -space-x-2 z-40">
                <img class="w-8 h-8 rounded-full border-2 border-white" src="https://images.unsplash.com/photo-1527980965255-d3b416303d12?w=100&q=80" alt="">
                <img class="w-8 h-8 rounded-full border-2 border-white" src="https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=100&q=80" alt="">
                <img class="w-8 h-8 rounded-full border-2 border-white" src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=100&q=80" alt="">
            </div>
            
            <div class="bg-white/95 backdrop-blur-lg rounded-2xl p-4 shadow-2xl flex items-center gap-4 relative overflow-hidden">
                <!-- Red triangle shape overlapping left side -->
                <div class="absolute -left-6 -bottom-6 w-24 h-32 bg-red-600 transform rotate-45 z-0 flex items-center justify-center">
                    <span class="text-white text-4xl font-bold -rotate-45 relative top-2 left-2">!</span>
                </div>
                
                <div class="pl-14 flex-1 relative z-10 w-full">
                    <!-- Text Content -->
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-gray-500 text-xs font-semibold">Kalideres, Cengkareng</p>
                            <h3 class="text-red-600 font-bold text-[17px] mt-0.5 tracking-tight">SEVERE LANDSLIDE</h3>
                        </div>
                        <div class="w-7 h-7 bg-purple-100 rounded-full flex items-center justify-center shrink-0">
                            <span class="block w-2.5 h-2.5 bg-purple-600 rounded-full"></span>
                        </div>
                    </div>
                    
                    <div class="flex justify-between items-center mt-3">
                        <span class="text-gray-500 text-[11px] font-medium">Updated 5 mins ago</span>
                        <button class="text-gray-700 text-xs font-bold flex items-center gap-1">
                            View Details 
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="9 18 15 12 9 6"></polyline>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Neighborhood Status Panel (Bottom Sheet overlay) -->
        <div class="absolute bottom-0 left-0 w-full bg-white/40 backdrop-blur-xl border-t border-white/40 rounded-t-[32px] pt-4 px-6 z-20 shadow-[0_-10px_40px_rgba(0,0,0,0.1)] h-[320px] flex flex-col pb-8">
            <!-- Pull Handle -->
            <div class="w-12 h-1.5 bg-gray-300 rounded-full mx-auto mb-5 shrink-0"></div>
            
            <h2 class="text-white text-[15px] font-bold tracking-widest uppercase text-center mb-5 drop-shadow-md shrink-0">Neighborhood Status</h2>
            
            <div class="space-y-3 overflow-y-auto no-scrollbar flex-1 pb-24">
                <!-- Status Card 1 -->
                <div class="bg-white/90 backdrop-blur-md rounded-[20px] p-3.5 flex justify-between items-center shadow-sm">
                    <div class="flex gap-3">
                        <div class="w-1.5 h-12 bg-red-500 rounded-full"></div>
                        <div>
                            <p class="text-gray-500 text-[11px] font-bold">Ciomas, Bogor</p>
                            <h3 class="text-gray-900 font-bold text-base leading-tight">Hujan Badai</h3>
                            <div class="flex -space-x-1.5 mt-1.5">
                                <img class="w-5 h-5 rounded-full border border-white" src="https://ui-avatars.com/api/?name=A" alt="">
                                <img class="w-5 h-5 rounded-full border border-white" src="https://ui-avatars.com/api/?name=B" alt="">
                                <img class="w-5 h-5 rounded-full border border-white" src="https://ui-avatars.com/api/?name=C" alt="">
                                <span class="text-[9px] text-gray-400 font-bold ml-2 relative top-0.5">+5</span>
                            </div>
                        </div>
                    </div>
                    <div class="flex flex-col items-end gap-2">
                        <span class="bg-[#bbf7d0] text-green-700 text-xs font-bold px-3 py-1.5 rounded-full">Zona Hijau</span>
                        <button class="w-6 h-6 bg-gray-100 rounded-full flex items-center justify-center text-gray-400">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="7" y1="17" x2="17" y2="7"></line>
                                <polyline points="7 7 17 7 17 17"></polyline>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Status Card 2 -->
                <div class="bg-white/90 backdrop-blur-md rounded-[20px] p-3.5 flex justify-between items-center shadow-sm">
                    <div class="flex gap-3">
                        <div class="w-1.5 h-12 bg-blue-600 rounded-full"></div>
                        <div>
                            <p class="text-gray-400 text-[11px] font-bold">Gancit, Jakarta Selatan</p>
                            <h3 class="text-gray-900 font-bold text-base leading-tight">Banjir</h3>
                            <div class="flex -space-x-1.5 mt-1.5">
                                <img class="w-5 h-5 rounded-full border border-white" src="https://ui-avatars.com/api/?name=D" alt="">
                                <img class="w-5 h-5 rounded-full border border-white" src="https://ui-avatars.com/api/?name=E" alt="">
                                <img class="w-5 h-5 rounded-full border border-white" src="https://ui-avatars.com/api/?name=F" alt="">
                                <span class="text-[9px] text-gray-400 font-bold ml-2 relative top-0.5">+5</span>
                            </div>
                        </div>
                    </div>
                    <div class="flex flex-col items-end gap-2">
                        <span class="bg-[#fef08a] text-yellow-700 text-xs font-bold px-3 py-1.5 rounded-full">Zona Kuning</span>
                        <button class="w-6 h-6 bg-gray-100 rounded-full flex items-center justify-center text-gray-400">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="7" y1="17" x2="17" y2="7"></line>
                                <polyline points="7 7 17 7 17 17"></polyline>
                            </svg>
                        </button>
                    </div>
                </div>

            </div>
        </div>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <!-- Semi-circle cutout for center button -->
            <div class="absolute left-1/2 -top-6 w-[84px] h-[84px] bg-transparent rounded-full border-t border-gray-100 shadow-[0_-4px_20px_rgba(0,0,0,0.02)] transform -translate-x-1/2" style="clip-path: circle(50% at 50% 100%); background-color: white;"></div>

            <a href="home.html" class="nav-item w-1/5">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                <span>Home</span>
            </a>
            <a href="maps.html" class="nav-item active w-1/5">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"></path>
                    <path d="M2 12h20"></path>
                </svg>
                <span class="text-green-500">Maps</span>
            </a>
            
            <!-- Center spacing -->
            <div class="w-1/5 relative">
                <a href="add-request.html" class="center-action-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                    </svg>
                </a>
            </div>

            <a href="leaderboard.html" class="nav-item w-1/5">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M8 21h8"></path>
                    <path d="M12 17v4"></path>
                    <path d="M7 4h10"></path>
                    <path d="M5 4h14a2 2 0 0 1 2 2v2a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"></path>
                    <path d="M8 10v7a2 2 0 0 0 2 2h4a2 2 0 0 0 2-2v-7"></path>
                </svg>
                <span>Leaderboard</span>
            </a>
            <a href="profile.html" class="nav-item w-1/5">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
                <span>Profile</span>
            </a>
        </nav>

    </div>
</body>
</html>

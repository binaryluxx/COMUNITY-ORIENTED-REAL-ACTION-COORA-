<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>COORA - Friends & Relations</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="index.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#22c55e',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-white">
    <div class="app-container no-scrollbar relative min-h-screen">
        
        <!-- Status Bar -->
        <div class="flex justify-between items-center px-6 pt-4 pb-2 bg-white sticky top-0 z-50">
            <span class="text-[15px] font-semibold tracking-tight text-black">9:41</span>
            <div class="flex items-center gap-1.5 fill-black">
                <svg width="18" height="12" viewBox="0 0 18 12"><path d="M14.5 9H16.5C17.0523 9 17.5 8.55228 17.5 8V4C17.5 3.44772 17.0523 3 16.5 3H14.5C13.9477 3 13.5 3.44772 13.5 4V8C13.5 8.55228 13.9477 9 14.5 9Z"/><path d="M10 9H12C12.5523 9 13 8.55228 13 8V5C13 4.44772 12.5523 4 12 4H10C9.44772 4 9 4.44772 9 5V8C9 8.55228 9.44772 9 10 9Z"/><path d="M5.5 9H7.5C8.05228 9 8.5 8.55228 8.5 8V6C8.5 5.44772 8.05228 5 7.5 5H5.5C4.94772 5 4.5 5.44772 4.5 6V8C4.5 8.55228 4.94772 9 5.5 9Z"/><path d="M1 9H3C3.55228 9 4 8.55228 4 8V7C4 6.44772 3.55228 6 3 6H1C0.447715 6 0 6.44772 0 7V8C0 8.55228 0.447715 9 1 9Z"/></svg>
                <svg width="16" height="12" viewBox="0 0 16 12"><path fill-rule="evenodd" clip-rule="evenodd" d="M8 11L15.5 3.5C13.4289 1.42893 10.8656 0.25 8 0.25C5.13438 0.25 2.57107 1.42893 0.5 3.5L8 11ZM8 9L13.5 3.5C12.0163 2.01632 10.0911 1.25 8 1.25C5.90886 1.25 3.9837 2.01632 2.5 3.5L8 9Z"/><path d="M8 11L12.5 6.5C11.3323 5.33232 9.7454 4.75 8 4.75C6.2546 4.75 4.66768 5.33232 3.5 6.5L8 11Z"/></svg>
                <svg width="25" height="12" viewBox="0 0 25 12"><rect x="0.5" y="1" width="21" height="10" rx="3.5" stroke="black"/><path d="M23 4V8C23.5523 8 24 7.55228 24 7V5C24 4.44772 23.5523 4 23 4Z"/><rect x="2" y="2.5" width="13" height="7" rx="2.5"/></svg>
            </div>
        </div>

        <!-- Header -->
        <header class="px-6 py-4 flex items-center gap-4 bg-white sticky top-9 z-40">
            <a href="profile.html" class="w-10 h-10 bg-white rounded-full flex items-center justify-center border border-gray-200 hover:bg-gray-50 flex-shrink-0 shadow-sm">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            </a>
            <h1 class="text-[24px] font-bold text-black tracking-tight flex-1">
                Friends & <span class="text-[#55db36]">Relations</span>
            </h1>
        </header>

        <!-- Search Bar -->
        <div class="px-6 pb-6">
            <div class="relative">
                <input type="text" placeholder="Search and discover other users" 
                    class="w-full bg-white border border-gray-300 rounded-full py-3 px-5 text-sm font-medium text-gray-700 shadow-sm focus:outline-none focus:border-green-400 placeholder-gray-400">
                <button class="absolute right-4 top-1/2 -translate-y-1/2">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#d1d5db" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </button>
            </div>
        </div>

        <!-- Friends Section -->
        <div class="px-6">
            <h2 class="text-[22px] font-bold text-[#30363d] mb-4">Friends</h2>
            
            <div class="space-y-3">
                <!-- Card 1 -->
                <div class="bg-[#f0f1f2] rounded-2xl p-3 flex items-center justify-between shadow-sm hover:shadow-md transition-all">
                    <div class="flex items-center gap-3">
                        <div class="relative">
                            <img src="https://ui-avatars.com/api/?name=S" class="w-11 h-11 rounded-full border-2 border-white object-cover">
                            <div class="absolute -top-1 -left-1 w-4 h-4 bg-green-600 rounded-full border border-white text-[9px] text-white flex items-center justify-center font-bold">2</div>
                            <div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-[2px] border-white rounded-full"></div>
                        </div>
                        <div class="text-[13px] font-bold text-gray-800">Strawberry Pancake</div>
                    </div>
                    <div class="flex items-center gap-4">
                        <button class="bg-[#34ea72] hover:bg-green-500 text-white text-[11px] font-bold px-4 py-1.5 rounded-md shadow-sm">Message</button>
                        <button class="text-gray-400 hover:text-gray-700">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                        </button>
                    </div>
                </div>

                <!-- Card 2 -->
                <div class="bg-[#f0f1f2] rounded-2xl p-3 flex items-center justify-between shadow-sm hover:shadow-md transition-all">
                    <div class="flex items-center gap-3">
                        <img src="https://images.unsplash.com/photo-1544005313-94ddf0286df2?w=100&q=80" class="w-11 h-11 rounded-full border-2 border-white object-cover">
                        <div class="flex items-center gap-1">
                            <span class="text-[13px] font-bold text-gray-800">Frisian Flag</span>
                            <span class="text-[#ef4444] text-[10px] font-bold flex items-center">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M12 2c0 0-6 6-6 11s3.5 8 6 8 6-3.5 6-8-6-11-6-11z"/></svg>
                                54
                            </span>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <button class="bg-[#34ea72] hover:bg-green-500 text-white text-[11px] font-bold px-4 py-1.5 rounded-md shadow-sm">Message</button>
                        <button class="text-gray-400 hover:text-gray-700">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                        </button>
                    </div>
                </div>

                <!-- Card 3 -->
                <div class="bg-[#f0f1f2] rounded-2xl p-3 flex items-center justify-between shadow-sm hover:shadow-md transition-all">
                    <div class="flex items-center gap-3">
                        <img src="https://ui-avatars.com/api/?name=R" class="w-11 h-11 rounded-full border-2 border-white object-cover">
                        <div class="flex items-center gap-1">
                            <span class="text-[13px] font-bold text-gray-800">Red Slang</span>
                            <span class="text-[#ef4444] text-[10px] font-bold flex items-center">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M12 2c0 0-6 6-6 11s3.5 8 6 8 6-3.5 6-8-6-11-6-11z"/></svg>
                                12
                            </span>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <button class="bg-[#34ea72] hover:bg-green-500 text-white text-[11px] font-bold px-4 py-1.5 rounded-md shadow-sm">Message</button>
                        <button class="text-gray-400 hover:text-gray-700">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                        </button>
                    </div>
                </div>

                <!-- Card 4 -->
                <div class="bg-[#f0f1f2] rounded-2xl p-3 flex items-center justify-between shadow-sm hover:shadow-md transition-all">
                    <div class="flex items-center gap-3">
                        <div class="relative">
                            <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=100&q=80" class="w-11 h-11 rounded-full border-2 border-white object-cover">
                            <div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-[2px] border-white rounded-full"></div>
                        </div>
                        <div class="flex items-center gap-1">
                            <span class="text-[13px] font-bold text-gray-800">Rin4Made</span>
                            <span class="text-[#ef4444] text-[10px] font-bold flex items-center">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M12 2c0 0-6 6-6 11s3.5 8 6 8 6-3.5 6-8-6-11-6-11z"/></svg>
                                97
                            </span>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <button class="bg-[#34ea72] hover:bg-green-500 text-white text-[11px] font-bold px-4 py-1.5 rounded-md shadow-sm">Message</button>
                        <button class="text-gray-400 hover:text-gray-700">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                        </button>
                    </div>
                </div>

                <!-- Card 5 -->
                <div class="bg-[#f0f1f2] rounded-2xl p-3 flex items-center justify-between shadow-sm hover:shadow-md transition-all">
                    <div class="flex items-center gap-3">
                        <img src="https://ui-avatars.com/api/?name=F" class="w-11 h-11 rounded-full border-2 border-white object-cover">
                        <div class="text-[13px] font-bold text-gray-800">FrontRunner</div>
                    </div>
                    <div class="flex items-center gap-4">
                        <button class="bg-[#34ea72] hover:bg-green-500 text-white text-[11px] font-bold px-4 py-1.5 rounded-md shadow-sm">Message</button>
                        <button class="text-gray-400 hover:text-gray-700">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Relations Section -->
        <div class="px-6 mt-10">
            <h2 class="text-[22px] font-bold text-[#30363d] mb-10">Relations</h2>
            
            <div class="text-center w-full pb-20">
                <p class="text-gray-400 text-lg leading-tight font-light w-[80%] mx-auto">
                    You currently do not have any relations added.
                </p>
            </div>
        </div>
        
        <!-- Bottom line for iOS feel -->
        <div class="fixed bottom-2 left-1/2 transform -translate-x-1/2 w-32 h-1.5 bg-black rounded-full z-50"></div>
    </div>
</body>
</html>

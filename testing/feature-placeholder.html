<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>COORA - Feature Under Construction</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="index.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#22c55e',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-100">
    <div class="app-container no-scrollbar relative bg-white min-h-screen flex flex-col">
        <!-- Status Bar Fake -->
        <div class="flex justify-between items-center px-6 pt-4 pb-2 bg-transparent w-full z-50">
            <span class="text-[15px] font-semibold tracking-tight text-black">9:41</span>
            <div class="flex items-center gap-1.5 opacity-80">
                <!-- Battery/wifi icons ommitted for brevity -->
                <span class="text-xs font-bold text-gray-500">100%</span>
            </div>
        </div>

        <!-- Header -->
        <header class="px-6 py-4 flex items-center gap-4 bg-white z-40 border-b border-gray-100">
            <button onclick="window.history.back()" class="w-10 h-10 bg-white rounded-full flex items-center justify-center border border-gray-200 hover:bg-gray-50 transition-colors">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </button>
            <h1 class="text-[18px] font-bold text-gray-800">Menu</h1>
        </header>

        <div class="flex-1 flex flex-col items-center justify-center p-8 text-center bg-gray-50">
            <div class="w-32 h-32 bg-green-100 rounded-full flex items-center justify-center mb-6 shadow-sm border-4 border-white transform rotate-3">
                <span class="text-5xl">🚧</span>
            </div>
            <h2 class="text-2xl font-extrabold text-gray-800 mb-3">Feature Coming Soon</h2>
            <p class="text-gray-500 text-[15px] font-medium leading-relaxed mb-8">
                We are still working hard to prepare this area for you. Please check back later!
            </p>
            <button onclick="window.history.back()" class="bg-green-500 hover:bg-green-600 text-white font-bold py-3.5 px-8 rounded-full shadow-lg hover:shadow-xl transition-all hover:-translate-y-1">
                Go Back
            </button>
        </div>
    </div>
</body>
</html>
